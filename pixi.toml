[workspace]
name = "RRIvis"
version = "0.1.0"
description = "A Python application for simulating and visualizing complex interferometric visibilities."
authors = ["Kartik Mandar <kartik4321mandar@gmail.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[tasks]
# New CLI entry points (v0.2.0+)
simulate = "rrivis simulate"
init = "rrivis init"
validate = "rrivis validate"

# Legacy entry point (deprecated - will be removed in v0.3.0)
start = "python src/main.py"

# Development tools
lint = "ruff check ."
fix = "ruff check --fix ."
format = "ruff format ."
check-format = "ruff format --check ."
typecheck = "mypy src/rrivis"
test = "python -m pytest tests/"
pre-commit-install = "pre-commit install"

[dependencies]
python = "=3.11"
pip = "*"
numpy = "*"
matplotlib = "*"
astropy = "*"
bokeh = "*"
plotly = "*"
astroquery = "*"
pyyaml = "*"
pyuvdata = "*"
tqdm = "*"
h5py = "*"
healpy = "*"
pympler = "*"
pydantic = ">=2.0"
pydantic-settings = ">=2.0"
scipy = "*"
ruff = "*"
mypy = "*"
pre-commit = "*"
sphinx = ">=8.2.3,<9"
sphinx-rtd-theme = ">=3.0.2,<4"
myst-parser = ">=4.0.1,<5"
numpydoc = ">=1.10.0,<2"
python-casacore = ">=3.7.1,<4"
rich = ">=14.2.0,<15"
click = ">=8.0"
nbconvert = ">=7.17.0,<8"
jupyter = ">=1.1.1,<2"
pytest-cov = ">=7.0.0,<8"

[pypi-dependencies]
pygdsm = "*"
pyradiosky = "*"
pysm3 = "*"
rrivis = { path = ".", editable = true }

# Note: ULSA requires manual install due to broken caput dependency:
#   pixi run pip install git+https://github.com/Yanping-Cong/ULSA.git
