[workspace]
name = "RRIviz"
version = "0.1.0"
description = "A Python-based application for simulating and visualizing complex visibilities in radio astronomy."
authors = ["Kartik Mandar <mandarkartik@gmail.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[tasks]
# New CLI entry points (v0.2.0+)
simulate = "rrivis simulate"
init = "rrivis init"
validate = "rrivis validate"

# Legacy entry point (deprecated - will be removed in v0.3.0)
start = "python src/main.py"

# Development tools
lint = "ruff check ."
fix = "ruff check --fix ."
format = "black ."
check-format = "black --check . && ruff format --check ."
test = "python -m pytest tests/"

[dependencies]
python = "=3.11"
pip = "*"
numpy = "*"
matplotlib = "*"
astropy = "*"
bokeh = "*"
plotly = "*"
astroquery = "*"
pyyaml = "*"
pyuvdata = "*"
tqdm = "*"
h5py = "*"
healpy = "*"
pympler = "*"
pydantic = ">=2.0"
pydantic-settings = ">=2.0"
scipy = "*"
black = "*"
ruff = "*"

[pypi-dependencies]
pygdsm = "*"
rrivis = { path = ".", editable = true }
