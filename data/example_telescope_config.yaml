# PyUVSim Telescope Configuration YAML
# This file specifies beam models, telescope location, and metadata
# Used in conjunction with antenna layout CSV file

beam_paths:
  # Beam ID 0: Analytic Gaussian beam with HERA diameter
  0: !AnalyticBeam
    class: GaussianBeam
    diameter: 14.0  # HERA antenna diameter in meters

  # Beam ID 1: Airy disk beam
  1: !AnalyticBeam
    class: AiryBeam
    diameter: 14.0

  # Beam ID 2: Analytic Gaussian with fixed sigma
  2: !AnalyticBeam
    class: GaussianBeam
    sigma: 0.02  # in radians
    sigma_type: power  # or 'epower' for E-field

# Global beam interpolation settings
spline_interp_opts:
  kx: 4
  ky: 4
freq_interp_kind: 'cubic'

# Telescope location (latitude, longitude, altitude in degrees/degrees/meters)
telescope_location: (-30.72152777777791, 21.428305555555557, 1073.0)

# Telescope name
telescope_name: HERA

# Optional: Select frequencies to load (reduces memory)
select:
  freq_buffer: 1000000  # 1 MHz buffer either side of simulated frequencies
