# Configuration: Shared Beam FITS File
# All antennas use the same beam FITS file
# This mode is useful for arrays where all antennas are identical

telescope:
  telescope_type:
    use_PYUVData_telescope: false
    use_custom_telescope: false
  telescope_name: "MWA"
  use_pyuvdata_location: false
  use_pyuvdata_antennas: false
  use_pyuvdata_diameters: false

antenna_layout:
  antenna_positions_file: "antenna_layout_examples/example_rrivis_format.txt"
  antenna_file_format: "rrivis"
  use_different_diameters: false
  all_antenna_diameter: 14.0
  diameters: {}
  fixed_HPBW: null

feeds:
  use_polarized_feeds: false
  polarization_type: ""
  use_different_polarization_type: false
  polarization_per_antenna: {}
  use_different_feed_types: false
  all_feed_type: ""
  feed_types_per_antenna: {}

beams:
  # NEW: Beam FITS configuration for shared mode
  beam_mode: "fits"  # FITS beam file
  per_antenna: false  # All antennas share the same beam file

  # Path to the shared beam FITS file (pyuvdata UVBeam format)
  beam_file: "/path/to/mwa_full_embedded_element_pattern.fits"

  # Beam loading parameters
  beam_za_max_deg: 90.0      # Load beam up to 90° zenith angle
  beam_za_buffer_deg: 5.0    # Add 5° buffer around observation ZA range
  beam_freq_buffer_hz: 1e6   # Add 1 MHz buffer around observation frequencies

  # Analytic beam fallback (used if beam file fails to load)
  all_beam_response: "gaussian"

baseline_selection:
  use_autocorrelations: true
  use_crosscorrelations: true
  only_selective_baseline_length: false
  selective_baseline_lengths: []
  selective_baseline_tolerance_meters: 2.0
  trim_by_angle_ranges: false
  selective_angle_ranges_deg: []

location:
  lat: -26.7033  # MWA location
  lon: 116.671
  height: 377.8

sky_model:
  flux_unit: Jy
  test_sources:
    use_test_sources: true
    num_sources: 5
    flux_min: 2.0
    flux_max: 8.0
    dec_deg: -30.72
    spectral_index: -0.8
  test_sources_healpix:
    use_test_sources: false
    num_sources: 100
    flux_min: 2.0
    flux_max: 8.0
    dec_deg: -30.72
    spectral_index: -0.8
    nside: 64
  gsm_healpix:
    use_gsm: false
    gsm_catalogue: "gsm2008"
    flux_limit: 50
    nside: 32
  gleam:
    use_gleam: false
    gleam_catalogue: "VIII/105/catalog"
    flux_limit: 50
  gleam_healpix:
    use_gleam: false
    gleam_catalogue: "VIII/100/gleamegc"
    flux_limit: 50
    nside: 32
  gsm+gleam_healpix:
    use_gsm_gleam: false
    gsm_catalogue: "gsm2008"
    gleam_catalogue: "VIII/100/gleamegc"
    flux_limit: 50
    nside: 32

obs_time:
  start_time: "2025-01-15T00:00:00"
  duration_seconds: 3600
  time_step_seconds: 600

obs_frequency:
  starting_frequency: 154  # MWA band
  frequency_interval: 1.28
  frequency_bandwidth: 30.72
  frequency_unit: "MHz"

output:
  save_simulation_data: true
  save_log_data: false
  plot_results_in_bokeh: true
  plotting_backend: "bokeh"
  angle_unit: "degrees"
  simulation_data_dir: ""
  simulation_subdir: "RRIVis_beam_fits_shared"
