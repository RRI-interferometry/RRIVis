# Configuration: Parabolic Dishes with Uniform Illumination
# Theoretical ideal case with 100% illumination efficiency
# Characteristics:
# - Highest aperture efficiency (100% illumination)
# - High sidelobes (-17.6 dB first sidelobe)
# - Not realistic for actual feeds, but useful for theoretical studies
# - Narrowest beam (k=1.02)

antenna_layout:
  antenna_positions_file: "antenna_layout_examples/example_casa_format.cfg"
  antenna_file_format: "casa"
  use_different_diameters: false
  all_antenna_diameter: 14.0

beams:
  all_beam_response: "gaussian"

location:
  lat: -30.72152777777791
  lon: 21.428305555555557
  height: 1073.0

sky_model:
  flux_unit: Jy
  test_sources:
    use_test_sources: true
    num_sources: 10
    flux_min: 2.0
    flux_max: 8.0
    dec_deg: -30.72
    spectral_index: -0.8

obs_time:
  start_time: "2025-01-15T00:00:00"
  duration_seconds: 3600
  time_step_seconds: 600

obs_frequency:
  starting_frequency: 100
  frequency_interval: 10
  frequency_bandwidth: 50
  frequency_unit: "MHz"

output:
  save_simulation_data: true
  save_log_data: false
  plot_results_in_bokeh: true
  angle_unit: "degrees"
