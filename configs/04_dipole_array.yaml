# Configuration: Short Dipole Array (HERA-style)
# Models short dipole antennas with frequency-independent HPBW
# Characteristics:
# - HPBW = π/2 radians = 90° (CONSTANT, frequency-independent)
# - Omnidirectional in H-plane
# - Figure-8 pattern in E-plane
# - Used in: HERA, MWA, LOFAR (approximately)
# - No diameter dependency for HPBW

antenna_layout:
  antenna_positions_file: "antenna_layout_examples/example_pyuvdata_format.txt"
  antenna_file_format: "pyuvdata"
  use_different_antenna_types: false
  all_antenna_type: "dipole_short"  # Short dipole (L << λ)
  antenna_types: {}
  use_different_diameters: false
  all_antenna_diameter: 1.0  # Nominal value, not used for dipoles

beams:
  all_beam_response: "gaussian"

location:
  lat: -30.72152777777791
  lon: 21.428305555555557
  height: 1073.0

sky_model:
  test_sources:
    use_test_sources: true
    num_sources: 10
    flux_limit: 50

obs_time:
  start_time: "2025-01-15T00:00:00"
  duration_seconds: 3600
  time_step_seconds: 600

obs_frequency:
  starting_frequency: 50
  frequency_interval: 5
  frequency_bandwidth: 50
  frequency_unit: "MHz"

output:
  save_simulation_data: true
  save_log_data: false
  plot_results_in_bokeh: true
  angle_unit: "degrees"
