# Minimal test config for development

telescope:
  telescope_name: "Test"

antenna_layout:
  antenna_positions_file: "antenna_layout_examples/example_rrivis_format.txt"
  antenna_file_format: "rrivis"

location:
  lat: -30.72
  lon: 21.43
  height: 1073.0

visibility:
  calculation_type: "direct_sum"
  sky_representation: "point_sources"

sky_model:
  flux_unit: Jy
  test_sources:
    use_test_sources: true
    num_sources: 10
    flux_min: 2.0
    flux_max: 8.0
    dec_deg: -30.72
    spectral_index: -0.8

obs_time:
  start_time: "2025-01-15T00:00:00"
  duration_seconds: 600
  time_step_seconds: 60

obs_frequency:
  starting_frequency: 100.0
  frequency_interval: 1.0
  frequency_bandwidth: 20.0
  frequency_unit: "MHz"

output:
  save_simulation_data: true
  save_log_data: true
  plot_results: true
  open_plots_in_browser: false
  plotting_backend: "bokeh"
  simulation_data_dir: "output"



