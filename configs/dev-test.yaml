# Minimal test config for development

telescope:
  telescope_name: "Test"

antenna_layout:
  antenna_positions_file: "antenna_layout_examples/example_rrivis_format.txt"
  antenna_file_format: "rrivis"

beams:
  all_beam_response: "gaussian"

location:
  lat: -30.72
  lon: 21.43
  height: 1073.0

sky_model:
  test_sources:
    use_test_sources: true
    num_sources: 10

obs_time:
  start_time: "2025-01-15T00:00:00"

obs_frequency:
  starting_frequency: 100.0
  frequency_interval: 1.0
  frequency_bandwidth: 20.0
  frequency_unit: "MHz"

output:
  save_simulation_data: true
  plot_results_in_bokeh: true
  plotting_backend: "bokeh"
  simulation_data_dir: "output"
  simulation_subdir: "dev-test"
