# Configuration: Parabolic Dishes with Gaussian Taper
# Models parabolic dishes with Gaussian feed illumination
# Characteristics:
# - HPBW = 1.18 * λ/D
# - Very low sidelobes (-40+ dB)
# - ~75% aperture efficiency
# - Smooth rolloff
# - Common in modern feed designs

antenna_layout:
  antenna_positions_file: "/Volumes/Crucial X8/repos/RRIvis/antenna_layout_examples/example_rrivis_format.txt"
  antenna_file_format: "rrivis"
  use_different_antenna_types: false
  all_antenna_type: "parabolic_gaussian"  # Gaussian feed taper
  antenna_types: {}
  use_different_diameters: false
  all_antenna_diameter: 14.0

beams:
  all_beam_response: "gaussian"

location:
  lat: -30.72152777777791
  lon: 21.428305555555557
  height: 1073.0

sky_model:
  test_sources:
    use_test_sources: true
    num_sources: 10
    flux_limit: 50

obs_time:
  start_time: "2025-01-15T00:00:00"
  duration_seconds: 3600
  time_step_seconds: 600

obs_frequency:
  starting_frequency: 100
  frequency_interval: 10
  frequency_bandwidth: 50
  frequency_unit: "MHz"

output:
  save_simulation_data: true
  save_log_data: false
  plot_results_in_bokeh: true
  angle_unit: "degrees"
