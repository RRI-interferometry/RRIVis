# Configuration: Per-Antenna Beams from Config File
# Each antenna's beam file is explicitly specified in this config
# This mode provides maximum flexibility for custom beam assignments

telescope:
  telescope_type:
    use_PYUVData_telescope: false
    use_custom_telescope: false
  telescope_name: "Custom Array"
  use_pyuvdata_location: false
  use_pyuvdata_antennas: false
  use_pyuvdata_diameters: false

antenna_layout:
  # Antenna file does NOT need BeamID column for this mode
  antenna_positions_file: "antenna_layout_examples/example_rrivis_format.txt"
  antenna_file_format: "rrivis"
  use_different_antenna_types: false
  all_antenna_type: "parabolic_10db_taper"
  antenna_types: {}
  use_different_diameters: false
  all_antenna_diameter: 14.0
  diameters: {}
  fixed_HPBW: null

feeds:
  use_polarized_feeds: false
  polarization_type: ""
  use_different_polarization_type: false
  polarization_per_antenna: {}
  use_different_feed_types: false
  all_feed_type: ""
  feed_types_per_antenna: {}

beams:
  # NEW: Beam FITS configuration for per-antenna mode with config mapping
  beam_mode: "per_antenna"  # Different beams for different antennas

  # How to assign beams: use antenna_beam_map below
  beam_assignment: "from_config"

  # Map antenna names to beam FITS files
  # IMPORTANT: Antenna names must match those in the antenna layout file
  antenna_beam_map:
    "ANT001": "/path/to/beams/hera_14m_dish.fits"
    "ANT002": "/path/to/beams/hera_14m_dish.fits"
    "ANT003": "/path/to/beams/mwa_dipole.fits"
    "ANT004": "/path/to/beams/mwa_dipole.fits"
    "ANT005": "/path/to/beams/custom_beam.fits"
    # Add more mappings as needed for each antenna

  # Beam loading parameters
  beam_za_max_deg: 90.0      # Load beam up to 90° zenith angle
  beam_za_buffer_deg: 5.0    # Add 5° buffer
  beam_freq_buffer_hz: 1e6   # Add 1 MHz buffer

  # Analytic beam fallback
  use_different_beam_responses: false
  all_beam_response: "gaussian"
  beam_response_per_antenna: {}
  cosine_taper_exponent: 1.0
  exponential_taper_dB: 10.0

baseline_selection:
  use_autocorrelations: true
  use_crosscorrelations: true
  only_selective_baseline_length: false
  selective_baseline_lengths: []
  selective_baseline_tolerance_meters: 2.0
  trim_by_angle_ranges: false
  selective_angle_ranges_deg: []

location:
  lat: -30.72152777777791  # HERA location
  lon: 21.428305555555557
  height: 1073.0

sky_model:
  flux_unit: Jy
  test_sources:
    use_test_sources: true
    num_sources: 10
    flux_min: 2.0
    flux_max: 8.0
    dec_deg: -30.72
    spectral_index: -0.8
  test_sources_healpix:
    use_test_sources: false
    num_sources: 100
    flux_min: 2.0
    flux_max: 8.0
    dec_deg: -30.72
    spectral_index: -0.8
    nside: 64
  gsm_healpix:
    use_gsm: false
    gsm_catalogue: "gsm2008"
    flux_limit: 50
    nside: 32
  gleam:
    use_gleam: false
    gleam_catalogue: "VIII/105/catalog"
    flux_limit: 50
  gleam_healpix:
    use_gleam: false
    gleam_catalogue: "VIII/100/gleamegc"
    flux_limit: 50
    nside: 32
  gsm+gleam_healpix:
    use_gsm_gleam: false
    gsm_catalogue: "gsm2008"
    gleam_catalogue: "VIII/100/gleamegc"
    flux_limit: 50
    nside: 32

obs_time:
  start_time: "2025-01-15T00:00:00"
  duration_seconds: 3600
  time_step_seconds: 600

obs_frequency:
  starting_frequency: 100
  frequency_interval: 10
  frequency_bandwidth: 50
  frequency_unit: "MHz"

output:
  save_simulation_data: true
  save_log_data: false
  plot_results_in_bokeh: true
  plotting_backend: "bokeh"
  angle_unit: "degrees"
  simulation_data_dir: ""
  simulation_subdir: "RRIVis_beam_fits_per_antenna_config"
