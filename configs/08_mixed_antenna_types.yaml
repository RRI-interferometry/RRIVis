# Configuration: Mixed Antenna Types (Advanced Example)
# Demonstrates per-antenna type and beam pattern configuration
# This shows how to use different antenna types in the same array
# Useful for:
# - Heterogeneous arrays
# - Testing different configurations
# - Comparing antenna types side-by-side

antenna_layout:
  antenna_positions_file: "/Volumes/Crucial X8/repos/RRIvis/antenna_layout_examples/example_rrivis_format.txt"
  antenna_file_format: "rrivis"
  use_different_antenna_types: true  # Enable per-antenna types
  all_antenna_type: "parabolic_10db_taper"  # Default for unlisted antennas
  # Specify different types for specific antennas:
  antenna_types:
    136: "parabolic_uniform"      # Antenna 136: uniform illumination
    140: "parabolic_10db_taper"   # Antenna 140: 10dB taper
    121: "parabolic_gaussian"     # Antenna 121: Gaussian taper
    123: "spherical_gaussian"     # Antenna 123: spherical reflector
  use_different_diameters: false
  all_antenna_diameter: 14.0

beams:
  use_different_beam_responses: true  # Enable per-antenna beam patterns
  all_beam_response: "gaussian"  # Default for unlisted antennas
  # Specify different beam patterns for specific antennas:
  beam_response_per_antenna:
    136: "gaussian"    # Antenna 136: Gaussian approximation
    140: "airy"        # Antenna 140: Airy disk pattern
    121: "cosine"      # Antenna 121: Cosine-tapered
    123: "gaussian"    # Antenna 123: Gaussian for spherical reflector
  cosine_taper_exponent: 1.5  # For cosine pattern

location:
  lat: -30.72152777777791
  lon: 21.428305555555557
  height: 1073.0

sky_model:
  test_sources:
    use_test_sources: true
    num_sources: 10
    flux_limit: 50

obs_time:
  start_time: "2025-01-15T00:00:00"
  duration_seconds: 3600
  time_step_seconds: 600

obs_frequency:
  starting_frequency: 100
  frequency_interval: 10
  frequency_bandwidth: 50
  frequency_unit: "MHz"

output:
  save_simulation_data: true
  save_log_data: false
  plot_results_in_bokeh: true
  angle_unit: "degrees"
